<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 300px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
  .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .header h1 { font-size: 14px; font-weight: 600; }
  .url { font-size: 12px; color: #888; word-break: break-all; margin-bottom: 12px; max-height: 36px; overflow: hidden; }
  .context-row { margin-bottom: 12px; }
  .context-row input { width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid #333; background: #0f3460; color: #e0e0e0; font-size: 12px; }
  .context-row input:focus { outline: none; border-color: #e94560; }
  .context-row input::placeholder { color: #666; }
  button { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  #save-btn { background: #e94560; color: #fff; }
  #save-btn:hover { background: #c73650; }
  #save-btn:disabled { background: #444; cursor: not-allowed; }
  .status { font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; }
  .status.success { color: #2ecc71; }
  .status.error { color: #e94560; }
  .no-token { font-size: 12px; color: #888; text-align: center; }
  .no-token a { color: #e94560; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
  <div class="header">
    <h1>Save to Crow's Nest</h1>
  </div>
  <div id="main">
    <div class="url" id="page-url"></div>
    <div class="context-row">
      <input type="text" id="context" placeholder="Optional context note..." autofocus>
    </div>
    <button id="save-btn">Save to Pipeline</button>
    <div class="status" id="status"></div>
  </div>
  <div id="no-token" style="display:none">
    <p class="no-token">No API token configured.<br><a id="open-options">Set up in extension options</a></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
